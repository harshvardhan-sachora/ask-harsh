<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Harsh — AI support console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12161b;
    --panel: #1a1f26;
    --panel-edge: #2a323c;
    --text: #e7eaee;
    --text-soft: #8b939d;
    --accent: #e0a238;
    --accent-dim: rgba(224,162,56,0.14);
    --user-bubble: #262d36;
    --agent-bubble: #1e242c;
    --online: #4caf7d;
    --error: #d9645a;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 14px;
  }

  .console {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 24px 60px -20px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    height: 640px;
  }

  /* ---------- HEADER ---------- */
  .console-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--panel-edge);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--online);
    box-shadow: 0 0 6px 1px rgba(76,175,125,0.6);
    animation: blink 2.4s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity: 0.4; } }

  .status-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  .console-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }
  .console-title span { color: var(--accent); }

  .console-subtitle {
    font-size: 11px;
    color: var(--text-soft);
  }

  /* ---------- SUGGESTED QUESTIONS ---------- */
  .suggestions {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    overflow-x: auto;
    border-bottom: 1px solid var(--panel-edge);
  }

  .suggestion-chip {
    flex: 0 0 auto;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-soft);
    background: var(--user-bubble);
    border: 1px solid var(--panel-edge);
    border-radius: 100px;
    padding: 6px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--text); }

  /* ---------- MESSAGES ---------- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg-row { display: flex; flex-direction: column; max-width: 85%; }
  .msg-row.user { align-self: flex-end; align-items: flex-end; }
  .msg-row.agent { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 13px;
    border-radius: 10px;
    font-size: 13.5px;
    line-height: 1.5;
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    border-top-right-radius: 2px;
  }
  .msg-row.agent .bubble {
    background: var(--agent-bubble);
    border-left: 2px solid var(--accent);
    border-top-left-radius: 2px;
  }
  .msg-row.agent .bubble.error-bubble {
    border-left-color: var(--error);
    color: #f0c4c0;
  }

  .msg-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-soft);
    margin-top: 4px;
    padding: 0 3px;
  }

  .sources-tag {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 6px;
    padding: 0 2px;
  }
  .source-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    background: var(--accent-dim);
    border-radius: 100px;
    padding: 3px 8px;
    letter-spacing: 0.02em;
  }

  .typing-dots {
    display: flex;
    gap: 3px;
    padding: 4px 2px;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-soft);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---------- INPUT ---------- */
  .input-row {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid var(--panel-edge);
  }

  .input-row input {
    flex: 1;
    background: var(--user-bubble);
    border: 1px solid var(--panel-edge);
    border-radius: 100px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
  }
  .input-row input::placeholder { color: var(--text-soft); }
  .input-row input:focus { outline: none; border-color: var(--accent); }

  .send-btn {
    background: var(--accent);
    color: #241a08;
    border: none;
    border-radius: 100px;
    padding: 0 18px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  .send-btn:hover { filter: brightness(1.1); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  @media (max-width: 500px) {
    .console { height: 92vh; border-radius: 10px; }
  }
</style>
</head>
<body>

<div class="console">
  <div class="console-header">
    <div class="status-row">
      <div class="status-dot"></div>
      <div class="status-text">Agent online</div>
    </div>
    <div class="console-title">Ask <span>Harsh</span></div>
    <div class="console-subtitle">Answers are grounded in his real portfolio data — not guesses</div>
  </div>

  <div class="suggestions" id="suggestions">
    <div class="suggestion-chip">What projects has he built?</div>
    <div class="suggestion-chip">What's his tech stack?</div>
    <div class="suggestion-chip">Is he available for freelance work?</div>
    <div class="suggestion-chip">Tell me about the weather app</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <input type="text" id="questionInput" placeholder="Ask something about Harsh…" maxlength="500">
    <button class="send-btn" id="sendBtn">Send</button>
  </div>
</div>

<script>
(function () {
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn');
  const suggestions = document.getElementById('suggestions');

  function timeNow() {
    return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function addMessage(role, text, sources) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);

    if (sources && sources.length) {
      const tagWrap = document.createElement('div');
      tagWrap.className = 'sources-tag';
      tagWrap.innerHTML = sources.map(s => `<span class="source-pill">${s}</span>`).join('');
      row.appendChild(tagWrap);
    }

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timeNow();
    row.appendChild(time);

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return { row, bubble };
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row agent';
    row.id = 'typingRow';
    row.innerHTML = `<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const row = document.getElementById('typingRow');
    if (row) row.remove();
  }

  async function askQuestion(question) {
    addMessage('user', question);
    input.value = '';
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        const { bubble } = addMessage('agent', data.error || 'Something went wrong. Try again.');
        bubble.classList.add('error-bubble');
      } else {
        addMessage('agent', data.answer, data.sources);
      }
    } catch (err) {
      removeTyping();
      const { bubble } = addMessage('agent', 'Could not reach the support agent. Check your connection and try again.');
      bubble.classList.add('error-bubble');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', () => {
    const q = input.value.trim();
    if (q) askQuestion(q);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const q = input.value.trim();
      if (q) askQuestion(q);
    }
  });
  suggestions.addEventListener('click', (e) => {
    const chip = e.target.closest('.suggestion-chip');
    if (chip) askQuestion(chip.textContent);
  });

  addMessage('agent', "Hi! I'm an AI assistant trained on Harsh's real portfolio data. Ask me about his projects, skills, or availability.");
})();
</script>

</body>
</html>
